<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitness-app</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}
.card{
    background:#222;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}
input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}
button{
    background:#4CAF50;
    color:white;
    cursor:pointer;
}
.history-item{
    margin-top:10px;
    padding:10px;
    background:#333;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>💪fitness-app</h1>

<div class="card">
    <h2>今日建議課表</h2>
    <p id="nextWorkout">請先完成一次訓練紀錄</p>
</div>

<div class="card">
    <h2>訓練紀錄</h2>
    <input id="action" placeholder="動作名稱（例如：胸、背、腿）">
    <input id="weight" placeholder="重量 kg">
    <input id="reps" placeholder="次數">
    <button onclick="saveWorkout()">儲存並分析</button>
</div>

<div class="card">
    <h2>AI 教練建議</h2>
    <p id="aiAdvice">請先輸入資料後按按鈕</p>
</div>

<div class="card">
    <h2>歷史紀錄</h2>
    <div id="history"></div>
</div>

<script>
let historyData = JSON.parse(localStorage.getItem("workoutHistory")) || [];

function getNextWorkout(lastAction){
    const schedule = {
        "胸":"背",
        "背":"腿",
        "腿":"肩",
        "肩":"胸"
    };
    return schedule[lastAction] || "胸";
}

function renderHistory(){
    const historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    historyData.forEach(item=>{
        historyDiv.innerHTML += `
            <div class="history-item">
                ${item.date}｜${item.action}｜${item.weight}kg｜${item.reps}次
            </div>
        `;
    });

    if(historyData.length > 0){
        const last = historyData[historyData.length - 1];
        document.getElementById("nextWorkout").innerText =
            `今天建議訓練：${getNextWorkout(last.action)}`;
    }
}

function saveWorkout(){
    const action = document.getElementById("action").value;
    const weight = document.getElementById("weight").value;
    const reps = document.getElementById("reps").value;

    if(!action || !weight || !reps){
        alert("請完整輸入");
        return;
    }

    const today = new Date().toLocaleDateString();

    const data = {
        date: today,
        action: action,
        weight: weight,
        reps: reps
    };

    historyData.push(data);
    localStorage.setItem("workoutHistory", JSON.stringify(historyData));

    document.getElementById("aiAdvice").innerText =
        `今天 ${action} 完成得很好，下一次建議練 ${getNextWorkout(action)} 💪`;

    renderHistory();
}

renderHistory();
</script>

</body>
</html>
