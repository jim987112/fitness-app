<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness App</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}
.card{
    background:#222;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}
input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
button{
    background:#4CAF50;
    color:white;
}
</style>
</head>
<body>

<h1>💪 我的健身 App</h1>

<div class="card">
    <h2>今日課表</h2>
    <p>胸 + 三頭</p>
    <p>臥推 4x10</p>
    <p>飛鳥 4x12</p>
</div>

<div class="card">
    <h2>訓練紀錄</h2>
    <input placeholder="動作名稱">
    <input placeholder="重量 kg">
    <input placeholder="次數">
    <button>儲存</button>
</div>

<div class="card">
    <h2>AI 教練建議</h2>
    <p>今天狀態不錯，建議下次加 2.5kg</p>
</div>
<p>123</p>
</body>
</html>
